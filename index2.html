<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cavalos</title>
  </head>
  <body>
    Quantidade de cavalos: <input id="qtd_cavalos" type="text" /> <br />
    <button onclick="exibirInputs()">Colocar nome dos cavalos</button>
    <div id="exibir"></div>

    <div id="inputs"></div>
    <div id="div_mensagem"></div>
  </body>
</html>

<script>

  let cavalos = [];

  function exibirInputs() {
    let qtdCavalos = Number(qtd_cavalos.value);

    if (qtdCavalos < 2 || qtdCavalos > 6) {
      alert("Insira uma quantidade entre 2 até 6");
    } else {
      exibir.innerHTML = `<input id="nome" type="text"><br><button onclick="cadastrar()">Cadastrar</button>`;
    }
  }

  function cadastrar() {
    cavalos.push({
      nome: nome.value,
      tempoTotal: 0
    });

    //só exibbe se ofor aq aunteidade

    if (cavalos.length == qtd_cavalos.value) {
      exibir.innerHTML = `Quantidade de voltas: <input id="qtd_voltas" type="text"> <br>
                <button onclick="largada()">Dar a LArgada</button>
`;
    }
  }

  function largada() {
    let msg = '';
    let qntVoltas = Number(qtd_voltas.value);
    let cavalomsg = ``;
    let tempoAtual = 0;

      for (let j = 0; j < qntVoltas; j++) {
        msg += `Volta: ${j+1}`

        for(let k = 0; k <= cavalos.length; k++){

            let cavalo = cavalos[k]
            let aleatório = (Math.random() * 2 + 7).toFixed(1);
    
            tempoAtual = aleatório // tempo atual!!!!!
            cavalo.tempoTotal += tempoAtual

            cavalomsg += `${cavalo.nome} - ${aleatório} - ${cavalo.tempoTotal} <br>`;
        }
        msg += `${cavalomsg}`
        // msg para cada cavalo de algum jeito, boa sorte!!!
        // precisa de um for para adicionar cada "nome -- tempo"
    }
    div_mensagem.innerHTML = msg
}
</script>
